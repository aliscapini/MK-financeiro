<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#FAF7F4">
<title>MK · Central de Conteúdo</title>
<link rel="apple-touch-icon" href="MK-icon2.png">
<link rel="apple-touch-icon" sizes="512x512" href="MK-icon2.png">
<link rel="icon" type="image/png" href="MK-icon2.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="MK Conteúdo">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FAF7F4;--surface:#FFFFFF;--ink:#2d2420;--ink-soft:#6f6258;
  --marrom:#9b8570;--nude:#ccad96;--line:#ece4da;--line-soft:#f3ede6;
  --roxo:#8b6fae;--verde:#7c9f7e;--amarelo:#cB9a4a;--vermelho:#c4796b;
  --shadow:0 1px 2px rgba(45,36,32,.04),0 6px 22px rgba(45,36,32,.06);--r:18px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{font-family:'Jost',-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--ink);
  font-weight:400;line-height:1.5;font-size:16px;padding-bottom:60px;-webkit-font-smoothing:antialiased}
.wrap{max-width:480px;margin:0 auto;padding:0 16px}
.serif{font-family:'Cormorant Garamond',serif}
.hidden{display:none!important}

/* ===== login ===== */
#login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.loginbox{background:var(--surface);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);
  padding:32px 26px;max-width:380px;width:100%;text-align:center}
.loginbox img{height:46px;margin-bottom:8px}
.loginbox .bl{font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--marrom);font-weight:500;margin-bottom:22px}
.loginbox input{width:100%;font-family:inherit;font-size:15px;border:1px solid var(--line);border-radius:11px;
  padding:13px 14px;margin-bottom:11px;background:#fff;color:var(--ink)}
.loginbox button{width:100%;background:var(--marrom);color:#fff;border:none;border-radius:11px;padding:14px;
  font-family:inherit;font-weight:600;font-size:15px;cursor:pointer;margin-top:4px}
.loginbox .err{color:var(--vermelho);font-size:13px;margin-top:10px;min-height:16px}
.loginbox .off{font-size:12px;color:var(--ink-soft);margin-top:16px;line-height:1.4}

/* ===== header ===== */
header{padding:16px 0 4px;text-align:center;position:relative}
.logo{height:36px;width:auto;opacity:.92;margin-bottom:5px}
.brandline{font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:var(--marrom);font-weight:500}
.sync{position:absolute;top:18px;right:0;font-size:10.5px;font-weight:500;padding:4px 10px;border-radius:99px;
  background:var(--line-soft);color:var(--ink-soft);display:flex;align-items:center;gap:5px}
.sync .d{width:7px;height:7px;border-radius:50%;background:var(--nude)}
.sync.ok .d{background:var(--verde)} .sync.saving .d{background:var(--amarelo)} .sync.off .d{background:var(--vermelho)}
.menu{position:absolute;top:16px;left:0;background:none;border:none;font-size:20px;color:var(--ink-soft);cursor:pointer;padding:4px}

/* ===== hero ===== */
.hero{margin-top:12px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r);
  padding:20px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.hero .eyebrow{font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--nude);font-weight:600}
.hero h1{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:32px;line-height:1.05;margin:4px 0 2px}
.hero .sub{color:var(--ink-soft);font-size:14px}
.hero .mission{margin-top:14px;display:flex;align-items:baseline;gap:8px}
.hero .mission b{font-family:'Cormorant Garamond',serif;font-size:40px;font-weight:600;color:var(--marrom);line-height:1}
.hero .mission span{font-size:14px;color:var(--ink-soft)}
.hero .weekpill{position:absolute;top:18px;right:18px;font-size:11px;background:var(--line-soft);
  color:var(--marrom);padding:5px 10px;border-radius:99px;font-weight:500}

/* ===== tabs ===== */
nav.tabs{position:sticky;top:0;z-index:30;background:rgba(250,247,244,.86);backdrop-filter:blur(10px);margin-top:16px;padding:6px 0}
.tabs .row{display:flex;gap:5px;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:5px}
.tab{flex:1;text-align:center;padding:9px 3px;border-radius:10px;font-size:12.5px;font-weight:500;color:var(--ink-soft);cursor:pointer;border:none;background:none;font-family:inherit;transition:.18s}
.tab.active{background:var(--marrom);color:#fff}
main{margin-top:10px}
.view{display:none;animation:fade .25s ease}.view.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.section-title{font-family:'Cormorant Garamond',serif;font-size:23px;font-weight:600;margin:18px 2px 8px}
.muted{color:var(--ink-soft);font-size:13px}

/* ===== task card ===== */
.task{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:14px 14px 14px 16px;margin-bottom:10px;box-shadow:var(--shadow);display:flex;gap:12px;align-items:flex-start}
.task.done{opacity:.55}
.task.pubtask{border-left:3px solid var(--marrom)}
.task .check{flex:none;width:26px;height:26px;border-radius:50%;border:2px solid var(--nude);margin-top:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;background:#fff}
.task .check:active{transform:scale(.9)}
.task.done .check{background:var(--verde);border-color:var(--verde)}
.task .check svg{width:14px;height:14px;stroke:#fff;stroke-width:3;fill:none;opacity:0;transition:.15s}
.task.done .check svg{opacity:1}
.task .body{flex:1;min-width:0}
.task .ttype{font-size:11px;letter-spacing:.06em;text-transform:uppercase;font-weight:600;color:var(--marrom)}
.task .ttitle{font-size:15px;font-weight:500;margin:2px 0 3px}
.task.done .ttitle{text-decoration:line-through}
.task .tmeta{font-size:12.5px;color:var(--ink-soft);display:flex;flex-wrap:wrap;gap:4px 10px}
.task .tmeta b{color:var(--marrom);font-weight:500}
.flag{display:inline-block;font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:99px;letter-spacing:.04em}
.flag.hoje{background:#f4ebe4;color:var(--marrom)}
.flag.atrasada{background:#f7e6e2;color:var(--vermelho)}
.flag.preparar{background:#eef2ec;color:var(--verde)}
.flag.aval{background:#efe9f4;color:var(--roxo)}
.task .actions{margin-top:9px;display:flex;gap:7px;flex-wrap:wrap}
.btn{font-family:inherit;font-size:12.5px;font-weight:500;border-radius:10px;padding:7px 12px;cursor:pointer;border:1px solid var(--line);background:#fff;color:var(--ink)}
.btn.primary{background:var(--marrom);color:#fff;border-color:var(--marrom)}
.btn.ghost{background:var(--line-soft);border-color:transparent;color:var(--marrom)}
.btn:active{transform:translateY(1px)}
.empty{text-align:center;padding:30px 20px;color:var(--ink-soft)}
.empty .big{font-family:'Cormorant Garamond',serif;font-size:26px;color:var(--marrom);margin-bottom:4px}
.stories-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.schip{font-size:11.5px;background:#fff;border:1px solid var(--line);border-radius:99px;padding:4px 10px;color:var(--ink-soft)}

/* ===== post card ===== */
.post{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:15px;margin-bottom:11px;box-shadow:var(--shadow)}
.post.adiado{border-color:var(--nude);border-style:dashed}
.post .ph{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.post .day{font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--marrom)}
.post h3{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:19px;margin:3px 0 2px;line-height:1.15}
.post .pmeta{font-size:12.5px;color:var(--ink-soft)}
.post .pilar{font-size:10.5px;font-weight:600;padding:3px 9px;border-radius:99px;background:var(--line-soft);color:var(--marrom);white-space:nowrap}
.chain{display:flex;gap:5px;margin-top:12px}
.step{flex:1;text-align:center}
.step .dot{height:8px;border-radius:99px;background:var(--line);transition:.2s}
.step.done .dot{background:var(--verde)}.step.now .dot{background:var(--marrom)}
.step .lbl{font-size:9px;margin-top:4px;color:var(--ink-soft)}
.step.done .lbl{color:var(--verde)}.step.now .lbl{color:var(--marrom);font-weight:600}
.post .reason{margin-top:11px;font-size:12px;background:var(--line-soft);border-radius:10px;padding:8px 11px;color:var(--ink-soft)}
.post .reason b{color:var(--marrom)}
.post .stories-line{margin-top:10px;font-size:12px;color:var(--ink-soft)}
.post .stories-line b{color:var(--marrom);font-weight:500}
.post .prow{display:flex;gap:7px;margin-top:11px;flex-wrap:wrap}

/* ===== semaphore / team / ideas ===== */
.legend{display:flex;flex-wrap:wrap;gap:8px 14px;margin:4px 2px 12px;font-size:11.5px;color:var(--ink-soft)}
.legend span{display:flex;align-items:center;gap:5px}
.dotc{width:11px;height:11px;border-radius:50%;flex:none}
.dotc.NUNCA{background:var(--roxo)}.dotc.LIVRE{background:var(--verde)}.dotc.CUIDADO{background:var(--amarelo)}.dotc.RECENTE{background:var(--vermelho)}
.semrow{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-bottom:7px;box-shadow:var(--shadow)}
.semrow .nm{flex:1;font-size:13.5px;font-weight:500}
.semrow .nm small{display:block;color:var(--ink-soft);font-weight:400;font-size:11.5px}
.st{font-size:10px;font-weight:600;letter-spacing:.05em;padding:3px 8px;border-radius:99px}
.st.NUNCA{background:#efe9f4;color:var(--roxo)}.st.LIVRE{background:#eaf1ea;color:var(--verde)}.st.CUIDADO{background:#f7f0df;color:#9d7a28}.st.RECENTE{background:#f7e7e3;color:var(--vermelho)}
.prof{display:flex;align-items:center;gap:11px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:11px 13px;margin-bottom:7px;box-shadow:var(--shadow)}
.prof .av{width:34px;height:34px;border-radius:50%;background:var(--line-soft);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-weight:600;color:var(--marrom);flex:none}
.prof .pn{flex:1;font-size:13.5px;font-weight:500}.prof .pn small{display:block;color:var(--ink-soft);font-weight:400;font-size:11.5px}
.badge{font-size:10px;font-weight:600;padding:3px 8px;border-radius:99px}
.badge.no{background:#efe9f4;color:var(--roxo)}.badge.yes{background:#eaf1ea;color:var(--verde)}
.idea{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:12px 13px;margin-bottom:8px;box-shadow:var(--shadow)}
.idea .it{font-size:14px;font-weight:500}
.idea .ig{font-size:12.5px;color:var(--ink-soft);font-style:italic;margin-top:2px}
.idea .im{font-size:11.5px;color:var(--marrom);margin-top:5px;display:flex;gap:10px;flex-wrap:wrap}
.prio{font-size:9.5px;font-weight:700;letter-spacing:.06em;padding:2px 7px;border-radius:99px}
.prio.ALTA{background:#f7e7e3;color:var(--vermelho)}.prio.MEDIA{background:#f7f0df;color:#9d7a28}.prio.BAIXA{background:#eef0ec;color:var(--ink-soft)}
.origem{font-size:10.5px;color:var(--roxo);background:#efe9f4;border-radius:99px;padding:2px 8px;margin-top:6px;display:inline-block}

/* ===== forms / aval ===== */
.field{margin-bottom:11px}
.field label{display:block;font-size:12px;color:var(--ink-soft);margin-bottom:4px;font-weight:500}
.field input,.field textarea{width:100%;font-family:inherit;font-size:15px;color:var(--ink);background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px 12px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.avalbtns{display:flex;gap:8px;margin-bottom:11px}
.avalbtn{flex:1;border:1px solid var(--line);background:#fff;border-radius:12px;padding:12px 6px;font-family:inherit;font-size:13px;cursor:pointer;text-align:center;color:var(--ink-soft);transition:.15s}
.avalbtn .em{font-size:22px;display:block;margin-bottom:3px}
.avalbtn.sel{border-color:var(--marrom);background:var(--line-soft);color:var(--marrom);font-weight:600}
.toggle{display:flex;gap:8px;margin-bottom:11px}
.toggle button{flex:1;border:1px solid var(--line);background:#fff;border-radius:10px;padding:10px;font-family:inherit;font-size:13px;cursor:pointer;color:var(--ink-soft)}
.toggle button.sel{border-color:var(--marrom);background:var(--line-soft);color:var(--marrom);font-weight:600}

/* ===== cta / future ===== */
.weekcta{background:var(--marrom);color:#fff;border-radius:16px;padding:16px;margin-top:8px;box-shadow:var(--shadow)}
.weekcta h4{font-family:'Cormorant Garamond',serif;font-size:21px;margin:0 0 4px;font-weight:600}
.weekcta p{font-size:13px;opacity:.9;margin:0 0 12px}
.weekcta button{width:100%;background:#fff;color:var(--marrom);border:none;border-radius:12px;padding:12px;font-family:inherit;font-weight:600;font-size:15px;cursor:pointer}
.weekcta.locked{background:var(--line-soft);color:var(--ink-soft)}
.weekcta.locked h4{color:var(--ink)}
.weekcta.locked button{background:#fff;color:var(--ink-soft);opacity:.6}
.future{background:linear-gradient(135deg,#fff,#faf6f1);border:1px dashed var(--nude);border-radius:16px;padding:16px;margin-top:14px}
.future h4{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;margin:0 0 6px;color:var(--marrom)}
.future ul{margin:8px 0 0;padding-left:18px;font-size:13px;color:var(--ink-soft)}.future li{margin-bottom:5px}
.future .tag{display:inline-block;font-size:10px;font-weight:600;color:var(--nude);border:1px solid var(--nude);border-radius:99px;padding:2px 9px;letter-spacing:.06em}

/* ===== modal / toast ===== */
.modal{position:fixed;inset:0;background:rgba(45,36,32,.42);z-index:100;display:none;align-items:flex-end;justify-content:center}
.modal.open{display:flex}
.sheet{background:var(--bg);width:100%;max-width:480px;border-radius:22px 22px 0 0;padding:20px 18px 28px;max-height:92vh;overflow:auto;animation:up .28s cubic-bezier(.2,.8,.2,1)}
@keyframes up{from{transform:translateY(100%)}to{transform:none}}
.sheethead{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.sheet h3{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:600;margin:2px 0 3px}
.xbtn{background:var(--line-soft);border:none;width:34px;height:34px;border-radius:50%;font-size:18px;color:var(--ink-soft);cursor:pointer;flex:none}
.copybox{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:13px;font-size:13px;line-height:1.55;white-space:pre-wrap;color:var(--ink);max-height:42vh;overflow:auto}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:11px 18px;border-radius:99px;font-size:13.5px;font-weight:500;opacity:0;transition:.3s;z-index:200;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,.2)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.footer{text-align:center;padding:22px 0 8px;font-size:11px;color:var(--nude);letter-spacing:.04em}

/* ===== desktop ===== */
@media(min-width:900px){
  body{padding-bottom:40px}
  .wrap{max-width:1080px;padding:0 32px}
  header{padding:24px 0 8px}
  .logo{height:42px}
  nav.tabs{padding:10px 0}
  .tabs .row{max-width:560px;margin:0 auto}
  .hero{padding:30px 34px}
  .hero h1{font-size:42px}
  .hero .mission b{font-size:48px}
  .section-title{font-size:27px}
  /* two-column grids on desktop */
  #v-hoje,#v-semana,#v-resultados{display:grid;grid-template-columns:1fr 1fr;gap:0 22px;align-items:start}
  #v-hoje .section-title,#v-semana .section-title,#v-resultados .section-title{grid-column:1/-1}
  #v-semana .weekcta,#v-resultados .future{grid-column:1/-1}
  #v-plano{display:grid;grid-template-columns:1fr 1fr;gap:0 22px;align-items:start}
  #v-plano .section-title{grid-column:1/-1}
  #v-plano .legend{grid-column:1/-1}
  .modal{align-items:center}
  .sheet{border-radius:22px;max-width:560px}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="loginbox">
    <img id="loginlogo" alt="Michele Krasniak">
    <div class="bl">Central de Conteúdo</div>
    <input id="email" type="email" placeholder="E-mail" autocomplete="username">
    <input id="senha" type="password" placeholder="Senha" autocomplete="current-password">
    <button id="loginbtn">Entrar</button>
    <div class="err" id="loginerr"></div>
    <div class="off" id="loginoff"></div>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
<div class="wrap">
  <header>
    <button class="menu" id="menuBtn">⋯</button>
    <img class="logo" id="logo" alt="Michele Krasniak">
    <div class="brandline">Central de Conteúdo</div>
    <div class="sync" id="syncPill"><span class="d"></span><span id="syncTxt">—</span></div>
  </header>

  <section class="hero">
    <div class="weekpill" id="weekpill">—</div>
    <div class="eyebrow">Hoje</div>
    <h1 id="heroDate">—</h1>
    <div class="sub" id="heroSub">—</div>
    <div class="mission"><b id="missionN">0</b><span id="missionTxt">tarefa para hoje</span></div>
  </section>

  <nav class="tabs"><div class="row">
    <button class="tab active" data-v="hoje">Hoje</button>
    <button class="tab" data-v="semana">Semana</button>
    <button class="tab" data-v="resultados">Resultados</button>
    <button class="tab" data-v="plano">Plano</button>
  </div></nav>

  <main>
    <div class="view active" id="v-hoje"></div>
    <div class="view" id="v-semana"></div>
    <div class="view" id="v-resultados"></div>
    <div class="view" id="v-plano"></div>
  </main>

  <div class="footer">Salão Michele Krasniak · Central de Conteúdo <b>v4.1</b></div>
</div>
</div>

<div class="modal" id="modal"><div class="sheet" id="sheet"></div></div>
<div class="toast" id="toast"></div>

/* date utils */
function today(){const d=new Date();d.setHours(0,0,0,0);return d;}
function iso(d){return d.toISOString().slice(0,10);}
function parse(s){const d=new Date(s+'T00:00:00');d.setHours(0,0,0,0);return d;}
function addDays(d,n){const x=new Date(d);x.setDate(x.getDate()+n);x.setHours(0,0,0,0);return x;}
function mondayOf(d){return addDays(d,-((d.getDay()+6)%7));}
function fmtShort(d){return d.getDate()+'/'+String(d.getMonth()+1).padStart(2,'0');}
function weekLabel(m){return fmtShort(m)+'–'+fmtShort(addDays(m,5));}
function uid(){return Math.random().toString(36).slice(2,9);}
function rng(seed){let s=((seed%2147483647)+2147483646)%2147483647;if(s===0)s=1;return()=>(s=s*16807%2147483647)/2147483647;}
function shuffle(arr,rnd){const a=arr.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(rnd()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

/* ---- rotation ---- */
function ageRotation(S){
 S.servicos.forEach(s=>{
  if(s.vezes>0)s.semanasDesde=(s.semanasDesde==null?0:s.semanasDesde)+1;
  if(s.vezes===0)s.status='NUNCA';
  else if(s.semanasDesde<2)s.status='RECENTE';
  else if(s.semanasDesde<4)s.status='CUIDADO';
  else s.status='LIVRE';
  if(typeof s.naoRepetir==='number'){s.naoRepetir-=1;if(s.naoRepetir<=0)delete s.naoRepetir;}
 });
}
function servScore(s,pilar){
 if(s.status==='RECENTE')return -1;
 if(!s.pilares.includes(pilar))return -1;
 if(s.naoRepetir>0)return -1;
 return s.status==='NUNCA'?100:s.status==='LIVRE'?45:12;
}
function profForService(S,serv){
 const n=serv.nome.toLowerCase();let nome='Michele Krasniak';
 if(n.includes('corte'))nome='Rafael Fiorentin';
 else if(n.includes('maquiagem'))nome='Ana Paula Trindade';
 else if(n.includes('manicure')||n.includes('pedicure')||n.includes('podolog')||n.includes('unha'))nome='Cleia Lima';
 const p=S.profissionais.find(x=>x.nome===nome)||S.profissionais[0];
 return {nome:p.nome,boost:p.apareceu?0:60,why:p.apareceu?'':'estreia de '+p.nome.split(' ')[0]};
}
function bancoFor(S,pilar){
 const pr={ALTA:0,MEDIA:1,BAIXA:2};
 return S.banco.filter(b=>b.status==='ideia'&&b.pilar===pilar).sort((a,b)=>pr[a.prio]-pr[b.prio])[0];
}
function estreiaPendente(S){return S.profissionais.some(p=>!p.apareceu);}

/* ---- stories ---- */
function storiesForDay(S,rnd,pilar,temPost){
 const pool=shuffle(STORY_TIPOS,rnd);const out=[];
 const n=2+Math.floor(rnd()*2); // 2-3
 for(const t of pool){
  if(t==='Prévia do post de hoje'&&!temPost)continue;
  out.push(t);if(out.length>=n)break;
 }
 return out;
}

/* ---- build a post + its task chain ---- */
function makePost(S,mon,wd,formato,pilar,tema,prof,servNome,anuncio,reason,rnd,adiado){

 const post={id:uid(),weekday:wd,date:iso(date),formato:anuncio?formato+' + Anúncio Meta':formato,pilar,
  tema,profissional:prof,servico:servNome,anuncio,horario:'18h',status:'A produzir',reason,
  stories:storiesForDay(S,rnd,pilar,true),aval:null,repetir:null,obs:'',adiado:!!adiado};
 S.posts.push(post);
 CHAIN.forEach(c=>S.tasks.push({id:uid(),postId:post.id,tipo:c.tipo,resp:c.resp,label:c.label,
   due:iso(addDays(date,c.off)),status:'pendente'}));
 if(anuncio)S.tasks.push({id:uid(),postId:post.id,tipo:'anuncio',resp:'Alison',label:'Subir o anúncio Meta',due:iso(date),status:'pendente'});
 S.tasks.push({id:uid(),postId:post.id,tipo:'stories',resp:'Camile',label:'Postar 2–3 stories do dia',due:iso(date),status:'pendente'});
 return post;
}

 });

 carried.forEach(c=>makePost(S,mon,c.weekday,c.formato.replace(' + Anúncio Meta',''),c.pilar,c.tema.replace(/ \(adiado\)$/,'')+' (adiado)',c.profissional,c.servico,c.anuncio,'↪️ <b>adiado</b> — não publicado na semana anterior',rnd,true));

  reasons.push(best.s.status==='NUNCA'?'🟣 <b>nunca divulgado</b>':best.s.status==='LIVRE'?'🟢 <b>livre</b>':'🟡 ângulo novo');

  if(idea){tema=idea.tema;if(idea.profissional&&S.profissionais.find(p=>p.nome===idea.profissional))prof=idea.profissional;idea.status='planejado';reasons.push('💡 banco de ideias');if(idea.origem)reasons.push(idea.origem);}
  const isAd=(wd===adWD);
  reasons.push('formato: '+fmtByWD[wd]+(isAd?' + anúncio':''));
  makePost(S,mon,wd,fmtByWD[wd],pilar,tema,prof,best.s.nome,isAd,reasons.join(' · '),rnd,false);
 });
 S.posts.sort((a,b)=>a.weekday-b.weekday);
}

function completeAvaliacao(S,postId){
 const post=S.posts.find(p=>p.id===postId);if(!post)return;
 const serv=S.servicos.find(s=>s.nome===post.servico);
 if(post.aval==='bom'||post.repetir===true){
  const tema=(serv&&serv.proximoAngulo)?serv.proximoAngulo:post.tema;
  if(!S.banco.some(b=>b.status==='ideia'&&b.pilar===post.pilar&&b.tema===tema))
   S.banco.unshift({prio:'ALTA',tema,profissional:post.profissional,formato:post.formato.replace(' + Anúncio Meta',''),
    gancho:'Aprofundar — teve bom resultado',pilar:post.pilar,status:'ideia',origem:'👍 deu certo'});
 }
 if(post.aval==='fraco'||post.repetir===false){
  if(serv)serv.naoRepetir=3; // block this service angle for ~3 weeks
  const tema='Novo ângulo para '+(post.pilar.replace(' & Conexao','').replace('Educacao & Autoridade','Educação'));
  if(!S.banco.some(b=>b.status==='ideia'&&b.pilar===post.pilar&&b.tema===tema))
   S.banco.push({prio:'MEDIA',tema,profissional:'Michele Krasniak',formato:'Reels (30-45s)',
    gancho:'O ângulo anterior teve baixo resultado — testar abordagem diferente',pilar:post.pilar,status:'ideia',origem:'👎 ajustar abordagem'});
 }
 if(post.obs&&post.obs.trim()){post._obsRegistrada=true;}
 trimBanco(S);
}
function trimBanco(S){
 const open=S.banco.filter(b=>b.status==='ideia');
 if(open.length<=30)return;
 const pr={ALTA:0,MEDIA:1,BAIXA:2};
 const keep=open.sort((a,b)=>pr[a.prio]-pr[b.prio]).slice(0,30);
 const keepSet=new Set(keep);
 S.banco=S.banco.filter(b=>b.status!=='ideia'||keepSet.has(b));
}
function suggestFromWeek(S){
 const m=S.metricas.filter(x=>x.alcance&&!isNaN(parseInt(x.alcance)));
 if(!m.length)return;
 const best=m.reduce((a,b)=>parseInt(b.alcance)>parseInt(a.alcance)?b:a);
 const post=S.posts.find(p=>p.id===best.postId);
 if(post&&!S.banco.some(b=>b.origem&&b.origem.includes('melhor alcance')&&b.pilar===post.pilar)){
  S.banco.unshift({prio:'ALTA',tema:'Segundo ângulo: '+post.tema.slice(0,40),profissional:post.profissional,formato:post.formato.replace(' + Anúncio Meta',''),
   gancho:'Foi o melhor alcance da semana — explorar de novo',pilar:post.pilar,status:'ideia',origem:'🏆 melhor alcance da semana'});
 }
}

/* ---------- task gating ---------- */
function prevDone(task){
  if(task.tipo==='roteiro'||task.tipo==='stories')return true;
  const dep=(task.tipo==='anuncio'||task.tipo==='avaliar')?'publicacao':
    {captacao:'roteiro',edicao:'captacao',publicacao:'edicao'}[task.tipo];
  if(!dep)return true;
  const p=S.tasks.find(t=>t.postId===task.postId&&t.tipo===dep);
  return !p||p.status==='feito';
}

/* ---------- completion ---------- */
function markServiceUsed(nome){const s=S.servicos.find(x=>x.nome===nome);if(!s)return;s.vezes=(s.vezes||0)+1;s.semanasDesde=0;s.status='RECENTE';if(s.naoRepetir)delete s.naoRepetir;s.ultimaSemana=weekLabel(parse(S.anchor));}
function markProfAppeared(nome){const p=S.profissionais.find(x=>nome.includes(x.nome.split(' ')[0]));if(p){p.apareceu=true;p.posts=(p.posts||0)+1;}}

function completeTask(id){
  const t=S.tasks.find(x=>x.id===id);if(!t)return;
  t.status='feito';t.doneAt=iso(today());
  const post=S.posts.find(p=>p.id===t.postId);
  if(t.tipo==='publicacao'&&post){
    post.status='Publicado';markServiceUsed(post.servico);markProfAppeared(post.profissional);
    if(!S.tasks.find(x=>x.postId===post.id&&x.tipo==='avaliar'))
      S.tasks.push({id:uid(),postId:post.id,tipo:'avaliar',resp:'Camile',label:'Avaliar resultado (7 dias depois)',due:iso(addDays(parse(post.date),7)),status:'pendente'});
    if(!S.metricas.find(m=>m.postId===post.id))
      S.metricas.push({postId:post.id,tema:post.tema,pub:post.date,pilar:post.pilar,alcance:'',msgs:'',agenda:'',salvos:''});
    toast('Publicado ✓ — em 7 dias o sistema lembra de avaliar');
  }else if(t.tipo==='anuncio'&&post){
    if(!S.anuncios.find(a=>a.postId===post.id))
      S.anuncios.push({postId:post.id,criativo:post.tema,inicio:t.due,orcamento:'',msgs:'',agenda:'',custo:''});
    toast('Anúncio registrado ✓');
  }else{const msg={roteiro:'Roteiro pronto ✓ — agora é gravar (captação)',captacao:'Captação feita ✓ — agora é editar',edicao:'Edição pronta ✓ — agora é só confirmar a publicação',stories:'Stories do dia marcados ✓'};toast(msg[t.tipo]||'Feito ✓');}
  saveState();render();
}
function uncompleteTask(id){const t=S.tasks.find(x=>x.id===id);if(t){t.status='pendente';delete t.doneAt;saveState();render();}}

function weekClosable(){if(!S.posts.length)return false;return S.posts.every(p=>{const pub=S.tasks.find(t=>t.postId===p.id&&t.tipo==='publicacao');return pub&&pub.status==='feito';});}

function buildBriefing(post){

  if(post.anuncio)txt+=`ANÚNCIO META: Sim · Mulheres 28-60 · BC+15km · Objetivo WhatsApp\n`;
  txt+=`STORIES DO DIA: ${(post.stories||[]).join(' · ')}\n`;
  if(post.roteiro)txt+=`\n--- ROTEIRO JÁ GERADO PELA IA (ajuste se quiser) ---\n${post.roteiro}\n`;

  if(past.length)txt+=`OBSERVAÇÕES ANTERIORES: ${past.map(p=>p.obs).join(' | ')}\n`;

function hojeTasks(){
  const d=today();const fazer=[],atrasadas=[],preparar=[],concluidas=[];
  const td=iso(d);
  S.tasks.forEach(t=>{
    if(t.status==='feito'){if(t.doneAt===td)concluidas.push(t);return;}
    if(!prevDone(t))return;const due=parse(t.due);
    if(due.getTime()===d.getTime())fazer.push(t);else if(due<d)atrasadas.push(t);else if(due<=addDays(d,3))preparar.push(t);});
  const by=(a,b)=>parse(a.due)-parse(b.due);

  const ord={NUNCA:0,LIVRE:1,CUIDADO:2,RECENTE:3};
  [...S.servicos].sort((a,b)=>ord[a.status]-ord[b.status]).forEach(s=>{
    h+=`<div class="semrow"><i class="dotc ${s.status}"></i><div class="nm">${s.nome}<small>${s.categoria} · ${s.preco} · ${s.proximoAngulo||''}</small></div><div class="st ${s.status}">${s.status}</div></div>`;});
  h+=`<div class="section-title">Equipe</div>`;
  S.profissionais.forEach(p=>{const ini=p.nome.split(' ').map(x=>x[0]).slice(0,2).join('');
    h+=`<div class="prof"><div class="av">${ini}</div><div class="pn">${p.nome}<small>${p.especialidade} · ${p.posts||0} post(s)</small></div><div class="badge ${p.apareceu?'yes':'no'}">${p.apareceu?'Já apareceu':'Nunca apareceu'}</div></div>`;});
  h+=`<div class="section-title">Banco de ideias</div>`;
  const pr={ALTA:0,MEDIA:1,BAIXA:2};
  [...S.banco].filter(b=>b.status==='ideia').sort((a,b)=>pr[a.prio]-pr[b.prio]).forEach(b=>{
    h+=`<div class="idea"><div style="display:flex;justify-content:space-between;gap:8px;align-items:start"><div class="it">${b.tema}</div><span class="prio ${b.prio}">${b.prio}</span></div>
      <div class="ig">"${b.gancho}"</div><div class="im"><span>${b.formato}</span><span>👤 ${b.profissional}</span><span>${PILAR_NOME[b.pilar]||b.pilar}</span></div>
      ${b.origem?`<span class="origem">${b.origem}</span>`:''}</div>`;});
  el.innerHTML=h;
}

/* ---------- modals ---------- */
/* ---- editar post da semana ---- */
function openEditPost(postId){
  const post=S.posts.find(p=>p.id===postId);if(!post)return;
  const sheet=document.getElementById('sheet');
  const servOpts=S.servicos.map(s=>`<option ${s.nome===post.servico?'selected':''}>${s.nome}</option>`).join('');
  const profOpts=S.profissionais.map(p=>`<option ${p.nome===post.profissional?'selected':''}>${p.nome}</option>`).join('');
  const baseFmt=post.formato.replace(' + Anúncio Meta','');
  const fmtOpts=FORMATOS_EDIT.map(f=>`<option ${baseFmt===f?'selected':''}>${f}</option>`).join('');
  const wdOpts=WD_OPTS.map(([w,n])=>`<option value="${w}" ${post.weekday===w?'selected':''}>${n}</option>`).join('');
  sheet.innerHTML=`<div class="sheethead"><div><div class="muted" style="letter-spacing:.2em;text-transform:uppercase;font-size:10px;color:var(--nude)">Editar post</div><h3 style="font-size:21px">Ajustar antes do roteiro</h3></div><button class="xbtn" onclick="closeModal()">×</button></div>
    <div class="field"><label>Tema</label><textarea id="ed_tema" rows="2">${post.tema.replace(/</g,'&lt;')}</textarea></div>
    <div class="field"><label>Profissional</label><select id="ed_prof">${profOpts}</select></div>
    <div class="field"><label>Serviço</label><select id="ed_serv">${servOpts}</select></div>
    <div class="grid2">
      <div class="field"><label>Formato</label><select id="ed_fmt">${fmtOpts}</select></div>
      <div class="field"><label>Dia</label><select id="ed_wd">${wdOpts}</select></div>
    </div>
    <label class="muted" style="font-weight:500;display:block;margin:4px 0 6px">Tem anúncio Meta?</label>
    <div class="toggle">
      <button data-ad="sim" class="${post.anuncio?'sel':''}" onclick="selAd(this)">Sim</button>
      <button data-ad="nao" class="${!post.anuncio?'sel':''}" onclick="selAd(this)">Não</button>
    </div>
    <button class="btn primary" style="width:100%;padding:13px" onclick="saveEditPost('${postId}')">Salvar alterações</button>`;
  sheet._ad=post.anuncio;openModal();
}
function selAd(elx){document.querySelectorAll('.toggle button').forEach(b=>b.classList.remove('sel'));elx.classList.add('sel');document.getElementById('sheet')._ad=(elx.dataset.ad==='sim');}
function saveEditPost(postId){
  const post=S.posts.find(p=>p.id===postId);if(!post)return;
  post.tema=document.getElementById('ed_tema').value.trim()||post.tema;
  post.profissional=document.getElementById('ed_prof').value;
  post.servico=document.getElementById('ed_serv').value;
  const baseFmt=document.getElementById('ed_fmt').value;
  const anuncio=document.getElementById('sheet')._ad;
  post.anuncio=anuncio;post.formato=anuncio?baseFmt+' + Anúncio Meta':baseFmt;
  const newWd=parseInt(document.getElementById('ed_wd').value);
  // weekday collision: if another post already uses this weekday, keep old to avoid two posts same day
  if(newWd!==post.weekday && S.posts.some(p=>p.id!==postId&&p.weekday===newWd)){toast('Já existe um post nesse dia. Escolha outro.');return;}
  post.weekday=newWd;post.date=iso(addDays(parse(S.anchor),newWd-1));
  // recompute task due dates for this post
  S.tasks.filter(t=>t.postId===postId).forEach(t=>{t.due=iso(addDays(parse(post.date),OFFSETS[t.tipo]||0));});
  // sync anuncio task existence
  const adTask=S.tasks.find(t=>t.postId===postId&&t.tipo==='anuncio');
  if(anuncio&&!adTask)S.tasks.push({id:uid(),postId:postId,tipo:'anuncio',resp:'Alison',label:'Subir o anúncio Meta',due:iso(parse(post.date)),status:'pendente'});
  if(!anuncio&&adTask)S.tasks=S.tasks.filter(t=>!(t.postId===postId&&t.tipo==='anuncio'));
  post.reason=(post.reason?post.reason+' · ':'')+'✏️ editado manualmente';
  delete post.roteiro; // plano mudou: roteiro antigo não vale mais
  saveState();closeModal();render();toast('Post atualizado ✓');
}

/* ---- gerar roteiros com IA (Edge Function) ---- */
function obsFor(p){
  const past=(S.history||[]).flatMap(h=>h.posts||[]).filter(x=>x.obs&&x.tema&&x.tema.split(' ')[0]===p.tema.split(' ')[0]);
  return past.map(x=>x.obs).join(' | ');
}
function gerarRoteirosIA(){
  if(MODE!=='online'||!supa){iaSheet('<b>Precisa estar Sincronizado</b><br>Conecte-se (bolinha verde) para usar a IA.',[['Fechar','closeModal()']]);return;}
  if(!S.posts.length){iaSheet('Gere uma semana primeiro.',[['Fechar','closeModal()']]);return;}
  iaSheet('Gerar os roteiros desta semana com IA agora?<br><span style="color:var(--ink-soft)">Tem um pequeno custo por geração (centavos).</span>',[['Gerar agora','runGerarRoteiros()','primary'],['Cancelar','closeModal()']]);
}
function iaSheet(html,buttons){
  const sheet=document.getElementById('sheet');
  const btns=buttons.map(b=>`<button class="btn ${b[2]==='primary'?'primary':''}" style="flex:1;padding:13px" onclick="${b[1]}">${b[0]}</button>`).join('');
  sheet.innerHTML=`<div class="sheethead"><div><div class="muted" style="letter-spacing:.2em;text-transform:uppercase;font-size:10px;color:var(--nude)">Roteiros com IA</div><h3 style="font-size:20px">ClaudIA</h3></div><button class="xbtn" onclick="closeModal()">×</button></div>
    <p id="ia_msg" style="font-size:15px;line-height:1.5;margin:4px 2px 16px">${html}</p>
    <div id="ia_btns" style="display:flex;gap:8px">${btns}</div>`;
  openModal();
}
async function runGerarRoteiros(){
  document.getElementById('ia_msg').innerHTML='✨ <b>IA escrevendo os roteiros…</b><br><span style="color:var(--ink-soft)">Pode levar alguns segundos. Não feche esta tela.</span>';
  document.getElementById('ia_btns').innerHTML='';
  setSync('saving','IA escrevendo…');
  const posts=S.posts.map(p=>({id:p.id,dia:DIAS[parse(p.date).getDay()],formato:p.formato,pilar:PILAR_NOME[p.pilar]||p.pilar,tema:p.tema,profissional:p.profissional,servico:p.servico,anuncio:p.anuncio,observacoes:obsFor(p)}));
  try{
    const {data:{session}}=await supa.auth.getSession();
    if(!session){return iaResult('Sessão expirada. Saia e entre de novo.',false);}
    const r=await fetch(FUNC_URL,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+session.access_token,'apikey':SB_KEY},body:JSON.stringify({posts})});
    const j=await r.json().catch(()=>({error:'resposta inválida do servidor'}));
    if(!r.ok||j.error){return iaResult('Falha na IA:<br><span style="color:var(--ink-soft);font-size:13px">'+(j.error||('erro '+r.status))+(j.detail?('<br>'+String(j.detail).slice(0,300)):'')+'</span>',false);}
    let n=0;(j.roteiros||[]).forEach(rt=>{const p=S.posts.find(x=>x.id===rt.id);if(p){p.roteiro=rt.roteiro;n++;}});
    saveState();setSync('ok','Sincronizado');
    if(n){closeModal();render();toast('Roteiros prontos ✓ ('+n+')');}
    else iaResult('A IA respondeu, mas não veio nenhum roteiro. Tente de novo.',false);
  }catch(e){iaResult('Não consegui falar com a IA. Verifique a conexão e tente de novo.',false);}
}
function iaResult(msg,ok){
  setSync('ok','Sincronizado');
  const m=document.getElementById('ia_msg');if(m)m.innerHTML=msg;
  const b=document.getElementById('ia_btns');if(b)b.innerHTML=`<button class="btn primary" style="flex:1;padding:13px" onclick="closeModal()">Fechar</button>`;
}
function showRoteiro(postId){
  const post=S.posts.find(p=>p.id===postId);if(!post||!post.roteiro)return;
  const sheet=document.getElementById('sheet');
  sheet.innerHTML=`<div class="sheethead"><div><div class="muted" style="letter-spacing:.2em;text-transform:uppercase;font-size:10px;color:var(--nude)">Roteiro gerado pela IA</div><h3>${post.tema}</h3></div><button class="xbtn" onclick="closeModal()">×</button></div>
    <div class="copybox">${post.roteiro.replace(/</g,'&lt;')}</div>
    <div style="display:flex;gap:8px;margin-top:13px">
      <button class="btn primary" style="flex:1;padding:12px" onclick="copyTxt()">Copiar roteiro</button>
      <button class="btn" style="padding:12px" onclick="openEditPost('${postId}')">Editar post</button>
    </div>
    <p class="muted" style="margin-top:10px;text-align:center">Revise antes de produzir. Para refazer, edite o post e gere de novo.</p>`;
  sheet._txt=post.roteiro;openModal();
}

function openBriefing(postId){const post=S.posts.find(p=>p.id===postId);if(!post)return;const txt=buildBriefing(post);
  const sheet=document.getElementById('sheet');
  sheet.innerHTML=`<div class="sheethead"><div><div class="muted" style="letter-spacing:.2em;text-transform:uppercase;font-size:10px;color:var(--nude)">Briefing para a ClaudIA</div><h3>${post.tema}</h3></div><button class="xbtn" onclick="closeModal()">×</button></div>
    <div class="copybox">${txt.replace(/</g,'&lt;')}</div>
    <div style="margin-top:13px"><button class="btn primary" style="width:100%;padding:12px" onclick="copyTxt()">Copiar briefing</button></div>
    <p class="muted" style="margin-top:10px;text-align:center">Cole no chat com a ClaudIA para gerar o roteiro.</p>`;
  sheet._txt=txt;openModal();}
function openAvaliar(postId,taskId){const post=S.posts.find(p=>p.id===postId);if(!post)return;
  const m=S.metricas.find(x=>x.postId===postId)||{};const idx=S.metricas.indexOf(m);
  const sheet=document.getElementById('sheet');
  sheet.innerHTML=`<div class="sheethead"><div><div class="muted" style="letter-spacing:.2em;text-transform:uppercase;font-size:10px;color:var(--nude)">Avaliar resultado</div><h3 style="font-size:21px">${post.tema}</h3></div><button class="xbtn" onclick="closeModal()">×</button></div>
    <div class="grid2">
      <div class="field"><label>Alcance</label><input id="av_alcance" value="${m.alcance||''}" inputmode="numeric"></div>
      <div class="field"><label>Mensagens WhatsApp</label><input id="av_msgs" value="${m.msgs||''}" inputmode="numeric"></div>
      <div class="field"><label>Agendamentos</label><input id="av_agenda" value="${m.agenda||''}" inputmode="numeric"></div>
      <div class="field"><label>Salvamentos</label><input id="av_salvos" value="${m.salvos||''}" inputmode="numeric"></div>
    </div>
    <label class="muted" style="font-weight:500;display:block;margin:4px 0 6px">Como foi o desempenho?</label>
    <div class="avalbtns">
      <div class="avalbtn ${post.aval==='bom'?'sel':''}" data-av="bom" onclick="selAval(this)"><span class="em">👍</span>Bom</div>
      <div class="avalbtn ${post.aval==='medio'?'sel':''}" data-av="medio" onclick="selAval(this)"><span class="em">😐</span>Médio</div>
      <div class="avalbtn ${post.aval==='fraco'?'sel':''}" data-av="fraco" onclick="selAval(this)"><span class="em">👎</span>Fraco</div>
    </div>
    <label class="muted" style="font-weight:500;display:block;margin:4px 0 6px">Vale repetir esse ângulo?</label>
    <div class="toggle">
      <button data-rp="sim" class="${post.repetir===true?'sel':''}" onclick="selRep(this)">Sim, repetir</button>
      <button data-rp="nao" class="${post.repetir===false?'sel':''}" onclick="selRep(this)">Não</button>
    </div>
    <div class="field"><label>Observações da postagem</label><textarea id="av_obs" rows="3" placeholder="Ex: muita gente perguntou preço · cliente amou · vídeo cortou no fim">${post.obs||''}</textarea></div>
    <button class="btn primary" style="width:100%;padding:13px" onclick="saveAvaliar('${postId}',${taskId?`'${taskId}'`:'null'},${idx})">Salvar avaliação</button>`;
  sheet._av={aval:post.aval,rep:post.repetir};openModal();}
function selAval(elx){document.querySelectorAll('.avalbtn').forEach(b=>b.classList.remove('sel'));elx.classList.add('sel');document.getElementById('sheet')._av.aval=elx.dataset.av;}
function selRep(elx){document.querySelectorAll('.toggle button').forEach(b=>b.classList.remove('sel'));elx.classList.add('sel');document.getElementById('sheet')._av.rep=elx.dataset.rp==='sim';}
function saveAvaliar(postId,taskId,idx){
  const post=S.posts.find(p=>p.id===postId);const av=document.getElementById('sheet')._av;
  post.aval=av.aval;post.repetir=av.rep;post.obs=document.getElementById('av_obs').value;
  if(idx>=0&&S.metricas[idx]){['alcance','msgs','agenda','salvos'].forEach(k=>{const v=document.getElementById('av_'+k).value;if(v!=='')S.metricas[idx][k]=v;});}
  completeAvaliacao(S,postId);
  if(taskId&&taskId!=='null'){const t=S.tasks.find(x=>x.id===taskId);if(t){t.status='feito';t.doneAt=iso(today());}}
  saveState();closeModal();render();toast('Avaliação salva — vira sugestão no plano ✓');
}
function copyTxt(){const txt=document.getElementById('sheet')._txt;const ok=()=>toast('Copiado ✓');
  if(navigator.clipboard&&navigator.clipboard.writeText)navigator.clipboard.writeText(txt).then(ok).catch(()=>fb(txt,ok));else fb(txt,ok);}
function fb(txt,cb){const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();try{document.execCommand('copy');cb();}catch(e){}ta.remove();}
function openModal(){document.getElementById('modal').classList.add('open');}
function closeModal(){document.getElementById('modal').classList.remove('open');}
document.getElementById('modal').onclick=e=>{if(e.target.id==='modal')closeModal();};

/* ---------- menu ---------- */
document.getElementById('menuBtn').onclick=()=>{
  const sheet=document.getElementById('sheet');
  sheet.innerHTML=`<div class="sheethead"><h3>Opções</h3><button class="xbtn" onclick="closeModal()">×</button></div>
    <button class="btn" style="width:100%;padding:13px;margin-bottom:9px" onclick="reseed()">Recomeçar plano do zero</button>
    ${MODE==='online'?`<button class="btn" style="width:100%;padding:13px" onclick="logout()">Sair da conta</button>`:''}
    <p class="muted" style="margin-top:12px;text-align:center">${MODE==='online'?'Sincronizado com o Supabase.':'Modo local — sem sincronização.'}</p>`;
  openModal();
};
function reseed(){if(confirm('Recomeçar do zero? Isso apaga o plano atual e recarrega a semana inicial.')){S=seedState();saveState();closeModal();go('hoje');toast('Plano reiniciado');}}
async function logout(){if(supa){try{await supa.auth.signOut();}catch(e){}}location.reload();}

/* ---------- toast ---------- */
let toastT;function toast(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),2200);}

/* ================= SUPABASE / STATE ================= */
function setSync(state,txt){const p=document.getElementById('syncPill');if(!p)return;p.className='sync '+state;document.getElementById('syncTxt').textContent=txt;}
function mirrorLocal(){try{localStorage.setItem(STORE,JSON.stringify(S));}catch(e){}}
function localLoad(){try{const r=localStorage.getItem(STORE);if(r)return JSON.parse(r);}catch(e){}return null;}
function saveState(){
  mirrorLocal();
  if(MODE!=='online'||!supa){setSync('off','Local');return;}
  setSync('saving','Salvando…');clearTimeout(saveTimer);saveTimer=setTimeout(pushState,600);
}
async function pushState(){
  try{const ts=new Date().toISOString();
    const {error}=await supa.from('mk_conteudo').upsert({id:'mk',state:S,updated_at:ts});
    if(error)throw error;lastTs=ts;setSync('ok','Sincronizado');
  }catch(e){setSync('off','Offline');}
}
async function pullState(){
  const {data,error}=await supa.from('mk_conteudo').select('state,updated_at').eq('id','mk').maybeSingle();
  if(error)throw error;return data;
}
async function refreshIfNewer(){
  if(MODE!=='online'||!supa)return;
  try{const d=await pullState();if(d&&d.updated_at&&d.updated_at!==lastTs){S=d.state;lastTs=d.updated_at;mirrorLocal();render();}}catch(e){}
}

/* ---------- boot ---------- */
function showLogin(off){
  document.getElementById('app').classList.add('hidden');
  document.getElementById('login').classList.remove('hidden');
  document.getElementById('loginoff').textContent=off||'';
}
async function afterLogin(){
  document.getElementById('login').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  setSync('saving','Carregando…');
  try{
    const d=await pullState();
    if(d){S=d.state;lastTs=d.updated_at;}else{S=seedState();await pushState();}
    setSync('ok','Sincronizado');
  }catch(e){
    S=localLoad()||seedState();MODE='offline';setSync('off','Local');
    toast('Sem sincronização — crie a tabela no Supabase');
  }
  mirrorLocal();render();
  document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible')refreshIfNewer();});
}
function startOffline(msg){
  MODE='offline';
  document.getElementById('login').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  S=localLoad()||seedState();mirrorLocal();setSync('off','Local');render();
  if(msg)toast(msg);
  document.addEventListener('visibilitychange',()=>{});
}
async function boot(){
  // try to init supabase; if the library/network isn't available, run locally
  if(window.supabase&&typeof window.supabase.createClient==='function'&&SB_URL.startsWith('http')){
    try{supa=window.supabase.createClient(SB_URL,SB_KEY);}catch(e){supa=null;}
  }
  if(!supa){startOffline('Modo local — sem sincronização');return;}
  try{
    const {data}=await supa.auth.getSession();
    if(data&&data.session){await afterLogin();}else{showLogin('Use o mesmo e-mail e senha do sistema financeiro.');}
  }catch(e){startOffline('Modo local — sem conexão');}
}
document.getElementById('loginbtn').onclick=async()=>{
  const email=document.getElementById('email').value.trim();
  const senha=document.getElementById('senha').value;
  const err=document.getElementById('loginerr');err.textContent='';
  if(!email||!senha){err.textContent='Preencha e-mail e senha.';return;}
  document.getElementById('loginbtn').textContent='Entrando…';
  try{
    const {error}=await supa.auth.signInWithPassword({email,password:senha});
    if(error){err.textContent='E-mail ou senha incorretos.';document.getElementById('loginbtn').textContent='Entrar';return;}
    await afterLogin();
  }catch(e){err.textContent='Sem conexão. Tente novamente.';document.getElementById('loginbtn').textContent='Entrar';}
};
document.getElementById('senha').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('loginbtn').click();});

boot();

</script>
