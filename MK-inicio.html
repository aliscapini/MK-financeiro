<style>
:root{--bg:#FAF7F4;--surface:#fff;--ink:#2d2420;--ink-soft:#6f6258;--marrom:#9b8570;--nude:#ccad96;--line:#ece4da;
  --shadow:0 1px 2px rgba(45,36,32,.04),0 10px 30px rgba(45,36,32,.08)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
body{font-family:'Jost',-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--ink);
  min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:32px 22px;-webkit-font-smoothing:antialiased}
.wrap{width:100%;max-width:420px;text-align:center}
.logo{width:78%;max-width:300px;height:auto;margin:0 auto 6px;display:block}
.brand{font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:600;line-height:1.05;color:var(--ink)}
.tag{font-size:11px;letter-spacing:.34em;text-transform:uppercase;color:var(--marrom);font-weight:500;margin-top:4px}
.greet{color:var(--ink-soft);font-size:14.5px;margin-top:18px}
.cards{margin-top:26px;display:flex;flex-direction:column;gap:14px}
.card{display:flex;align-items:center;gap:16px;text-decoration:none;color:inherit;background:var(--surface);
  border:1px solid var(--line);border-radius:20px;padding:20px 20px;box-shadow:var(--shadow);
  transition:transform .12s ease,box-shadow .12s ease}
.card:active{transform:scale(.985)}
.ic{width:56px;height:56px;border-radius:16px;flex:none;display:flex;align-items:center;justify-content:center;
  font-family:'Cormorant Garamond',serif;font-weight:600;color:#fff;overflow:hidden}
.ic.fin{font-size:24px;letter-spacing:.02em}
.ic .seal{width:78%;height:78%;object-fit:contain}
.ic.fin{background:linear-gradient(140deg,#403429,#2d2420)}
.ic.con{background:linear-gradient(140deg,#d2b6a0,#967f6a)}
.ct{flex:1;text-align:left}
.ct h2{font-family:'Cormorant Garamond',serif;font-size:23px;font-weight:600;line-height:1.1}
.ct p{font-size:13px;color:var(--ink-soft);margin-top:2px}
.arrow{color:var(--nude);font-size:22px;flex:none}
.foot{margin-top:30px;font-size:11px;color:var(--nude);letter-spacing:.04em}
@media(min-width:760px){
  .wrap{max-width:680px}
  .cards{flex-direction:row}
  .card{flex:1;flex-direction:column;text-align:center;padding:30px 22px;gap:14px}
  .ct{text-align:center}
  .arrow{display:none}
  .logo{max-width:360px}
  .brand{font-size:40px}
}
</style>
